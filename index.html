<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Sector ETF Holdings</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <h1>Sector ETF Holdings</h1>
    <div id="content">Loading…</div>
  </main>

  <script>
    async function loadHoldings() {
      try {
        const resp = await fetch('/holdings.json');
        const data = await resp.json();
        const container = document.getElementById('content');
        container.innerHTML = '';
        for (const [symbol, tickers] of Object.entries(data)) {
          const section = document.createElement('section');
          const csv = tickers.join(', ');
          const noCommas = tickers.join(' ');
          section.innerHTML = `
            <h2>${symbol}</h2>
            <p>${csv}</p>
            <button onclick="copyToClipboard('${csv.replace(/'/g, "\\'")}', '${symbol}')">Copy with Commas</button>
            <button onclick="copyToClipboard('${noCommas.replace(/'/g, "\\'")}', '${symbol}')">Copy without Commas</button>
          `;
          container.appendChild(section);
        }
      } catch (err) {
        document.getElementById('content').textContent = 'Failed to load data';
        console.error(err);
      }
    }

    function copyToClipboard(text, symbol) {
      navigator.clipboard.writeText(text).then(() => {
        alert(`Copied ${symbol} to clipboard!`);
      }).catch(err => {
        console.error('Failed to copy: ', err);
      });
    }

    loadHoldings();
  </script>
</body>
</html>
